name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, homelab]

    steps:
      - name: Deploy on homelab
        run: |
          set -euo pipefail
          cd /home/woolf/apps/health-garmin
          git fetch origin main
          git reset --hard origin/main
          docker compose up -d --build
