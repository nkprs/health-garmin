services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bio
      POSTGRES_USER: bio
      POSTGRES_PASSWORD: bio
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bio -d bio"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  pgadmin:
    image: dpage/pgadmin4:9
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD:-admin}
      - PGADMIN_LISTEN_PORT=80
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"

  garmin_export:
    build: .
    env_file: .env
    environment:
      - TZ=${TZ:-Europe/Helsinki}
      - OUT_DIR=/data
      - DAYS_BACK=${DAYS_BACK:-3}
    volumes:
      - ./data:/data

  loader:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_DSN=postgresql://bio:bio@db:5432/bio
      - IN_DIR=/data
    volumes:
      - ./data:/data
    command: ["python", "load_to_pg.py"]

  features:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_DSN=postgresql://bio:bio@db:5432/bio
      - IN_DIR=/data
    volumes:
      - ./data:/data
    command: ["python", "features.py"]

  brief:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_DSN=postgresql://bio:bio@db:5432/bio
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
      - OPENAI_API_URL=${OPENAI_API_URL:-https://api.openai.com/v1/responses}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_HTTP_REFERER=${OPENROUTER_HTTP_REFERER:-http://localhost}
      - OPENROUTER_APP_NAME=${OPENROUTER_APP_NAME:-garmin-export}
      - OPENAI_TIMEOUT_SEC=${OPENAI_TIMEOUT_SEC:-60}
      - OPENAI_MAX_RETRIES=${OPENAI_MAX_RETRIES:-5}
      - OPENAI_RETRY_BASE_SEC=${OPENAI_RETRY_BASE_SEC:-2}
      - OPENAI_RETRY_MAX_SEC=${OPENAI_RETRY_MAX_SEC:-60}
      - OPENAI_DRY_RUN=${OPENAI_DRY_RUN:-0}
      - TARGET_DATE=${TARGET_DATE:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TELEGRAM_API_BASE=${TELEGRAM_API_BASE:-https://api.telegram.org}
      - TELEGRAM_TIMEOUT_SEC=${TELEGRAM_TIMEOUT_SEC:-20}
    command: ["python", "brief.py"]

volumes:
  pgdata:
  pgadmin_data:
